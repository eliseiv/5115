# =============================================================================
# novirell.shop — vhost for the claude-ios backend on the novirell server
# (49.12.189.77), served by the SHARED nginx `mas-nginx` (mail-aggregator stack),
# NOT by Traefik. This server has NO Traefik / no /opt/edge.
#
# DELIVERY (operator, docs/07-deployment.md §Сервер novirell):
#   PRIMARY:  docker cp deploy/nginx/novirell.shop.conf mas-nginx:/etc/nginx/conf.d/novirell.shop.conf
#             docker exec mas-nginx nginx -t && docker exec mas-nginx nginx -s reload
#   DURABILITY copy (survives an mas-nginx recreate that re-mounts the templates dir): the operator
#             also drops this content into /opt/mail-agregator/deploy/nginx/templates/ on the host
#             (that is the mail-aggregator project's own dir — NOT in this repo). The canonical
#             source of truth is THIS file (deploy/nginx/novirell.shop.conf); the server copies
#             are provisioned from it.
#
# NETWORK: mas-nginx (172.18.0.7) and our container novirell-api-1 both live on the external
# docker network `mas-net` (EDGE_NETWORK=mas-net in /opt/novirell/.env). nginx resolves the
# upstream by CONTAINER NAME via docker's embedded DNS (127.0.0.11).
#
# UPSTREAM NAME = novirell-api-1: the compose DEFAULT container name for service `api` under
# project `novirell` (deploy runs with `-p novirell` and COMPOSE_PROJECT_NAME=novirell). We do
# NOT set container_name (that would break scaling) and do NOT use a bare `api` alias (it could
# collide with another service of the same name on the SHARED mas-net). `<project>-api-1` is
# deterministic and unique. See docs/07-deployment.md §Имя контейнера api.
#
# TLS: cert issued by the HOST certbot, mounted read-only into mas-nginx at
# /etc/letsencrypt/live/novirell.shop/ (fullchain.pem + privkey.pem), valid to 2026-09-29.
# nginx OWNS TLS here (unlike the Traefik topology), so HSTS is set by nginx.
#
# SECURITY HEADERS: the APP's SecurityHeaders middleware sets CSP / X-Frame-Options /
# X-Content-Type-Options AND HSTS on non-preview responses (src/app/api_gateway/middleware.py:100-102,
# HSTS max-age=63072000); /v1/preview/* early-returns (middleware.py:98-99) and emits its OWN sandbox
# headers instead (ADR-010, docs/05-security.md §Backend-hosted preview). This proxy therefore does
# NOT add a global CSP / X-Frame-Options / X-Content-Type-Options (they would clobber the app's and,
# on /v1/preview/*, break the sandbox contract). HSTS is the ONE exception: nginx owns TLS, so each
# proxy_pass location hides the app's upstream HSTS (proxy_hide_header) and nginx re-emits a single
# authoritative HSTS on every path (incl. nginx-generated errors). No Set-Cookie is injected anywhere.
# =============================================================================

# HTTP: ACME-challenge is served directly; everything else is redirected to HTTPS.
server {
    listen 80;
    listen [::]:80;
    server_name novirell.shop;

    # Let's Encrypt HTTP-01 renewal (host certbot writes here; mounted ro into mas-nginx).
    # MUST NOT be redirected — the ACME client needs a 200 on this path over plain HTTP.
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

# HTTPS: terminate TLS, reverse-proxy to the api container over mas-net.
server {
    listen 443 ssl;
    listen [::]:443 ssl;
    http2 on;
    server_name novirell.shop;

    # TLS material issued by the HOST certbot, mounted ro into mas-nginx.
    ssl_certificate     /etc/letsencrypt/live/novirell.shop/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/novirell.shop/privkey.pem;

    # HSTS — nginx owns TLS on this server, so it is the SINGLE authoritative source of HSTS
    # (incl. nginx-generated errors like a 502 with no upstream). `always` emits it on error
    # responses too. NOTE: the app's SecurityHeaders middleware ALSO sets HSTS on non-preview
    # responses (src/app/api_gateway/middleware.py:102, max-age=63072000). nginx `add_header` would
    # APPEND (not replace) that upstream value -> two conflicting HSTS headers. So each proxy_pass
    # location below hides the upstream HSTS via `proxy_hide_header Strict-Transport-Security;`, and
    # THIS single directive re-emits one authoritative HSTS on every path.
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;

    # docker embedded DNS — required because the upstream is referenced through a $variable
    # (see proxy_pass below): nginx resolves `novirell-api-1` at request time, so mas-nginx starts
    # fine even when our stack is down, and re-resolves after a redeploy gives the container a new IP.
    resolver 127.0.0.11 valid=10s;

    # client_max_body_size: the app's transport cap for /v1/chat/run inline base64 is
    # ATTACHMENT_REQUEST_BODY_LIMIT = 12582912 B = 12 MB (src/app/config.py, default). We set the
    # nginx cap SLIGHTLY ABOVE it (15m) on purpose: an over-limit request should reach the app and
    # be answered by ITS 413/422 (consistent JSON error), not be cut by nginx with a bare 413.
    client_max_body_size 15m;

    location / {
        # Upstream via a $variable so nginx uses `resolver` (runtime DNS) instead of resolving the
        # name once at config-load (which would fail to (re)start if the container were absent).
        set $upstream http://novirell-api-1:8000;
        proxy_pass $upstream;

        # Drop the app's own HSTS (middleware.py:102, non-preview) so only nginx's single
        # server-level HSTS survives — avoids a duplicate/conflicting header (add_header appends).
        proxy_hide_header Strict-Transport-Security;

        proxy_http_version 1.1;
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        # OVERWRITE (not append) X-Forwarded-For. mas-nginx is the internet-facing edge (TLS ends
        # here, no upstream proxy), so a client-supplied XFF is UNTRUSTED and must be discarded.
        # `$proxy_add_x_forwarded_for` would APPEND $remote_addr to the attacker's value, and the
        # app (src/app/deps.py client_ip: takes the (hop_count+1)-th-from-right entry, hop_count=1)
        # would then return the SPOOFED left entry -> per-IP rate limit (AUTH_RATE_LIMIT_PER_IP /
        # ADMIN_RATE_LIMIT_PER_MIN) bypassable by header rotation. $remote_addr = the real client
        # IP as seen by nginx -> a single trustworthy entry.
        proxy_set_header X-Forwarded-For   $remote_addr;
        proxy_set_header X-Forwarded-Proto https;
    }

    # /v1/preview/* — user-generated (Claude-authored) HTML/JS with the app's OWN sandbox headers
    # (ADR-010, docs/05-security.md §Backend-hosted preview). The proxy MUST pass those response
    # headers through unmodified and MUST NOT add a global X-Frame-Options: DENY / CSP or any
    # Set-Cookie on this prefix. Because this vhost adds NO global CSP / X-Frame-Options / cookies
    # anyway (only HSTS), a dedicated location is not strictly required — but we keep an EXPLICIT
    # one for durability: it re-declares ONLY HSTS (never CSP/X-Frame), so if a future maintainer
    # ever adds a server-level CSP/X-Frame-Options, nginx's add_header REPLACE-on-redeclare rule
    # keeps it from leaking into the preview responses and clobbering the app's sandbox policy.
    location ^~ /v1/preview/ {
        add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;

        set $upstream_preview http://novirell-api-1:8000;
        proxy_pass $upstream_preview;

        # HSTS is allowed on /v1/preview/* (unlike CSP/X-Frame-Options, which the app owns here).
        # The app does NOT set HSTS on preview (middleware.py:98-99 early-returns before line 102),
        # so there is nothing to hide today — but keep proxy_hide_header for parity/robustness, and
        # re-emit the single nginx HSTS above. We must NOT hide/override CSP/X-Frame/nosniff here:
        # the preview route emits its OWN sandbox headers (ADR-010) and they pass through untouched.
        proxy_hide_header Strict-Transport-Security;

        proxy_http_version 1.1;
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        # Same anti-spoofing overwrite as location / (see the note there).
        proxy_set_header X-Forwarded-For   $remote_addr;
        proxy_set_header X-Forwarded-Proto https;
    }

    # /metrics — Prometheus exposition. The app's guard is FAIL-OPEN: with an empty
    # METRICS_SCRAPE_TOKEN (config.py default "") GET /metrics is served to anyone
    # (health.py:69 short-circuits). Scraping is meant to happen over the docker network straight
    # to the container, never via the public domain — so block it at the edge (defense-in-depth,
    # app behaviour unchanged). 404 (not 403) so we do not even reveal the endpoint exists,
    # consistent with how the app hides other resources (images.py / preview -> 404).
    location = /metrics {
        return 404;
    }
}
